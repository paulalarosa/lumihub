<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khaos Kontrol | Connection Debugger</title>
    <style>
        body {
            background-color: #000;
            color: #00ff00;
            font-family: monospace;
            padding: 20px;
            line-height: 1.5;
        }

        .success {
            color: #00ff00;
        }

        .error {
            color: #ff0000;
        }

        .warning {
            color: #ffff00;
        }

        h1 {
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }
    </style>
</head>

<body>
    <h1>SYSTEM DIAGNOSTIC TOOL</h1>
    <div id="log">Initializing diagnostics...</div>

    <script type="module">
        const log = (msg, type = 'info') => {
            const div = document.createElement('div');
            div.textContent = `[${new Date().toISOString().split('T')[1].split('.')[0]}] ${msg}`;
            div.className = type;
            document.getElementById('log').appendChild(div);
        };

        try {
            // Check Environment Variables (via meta tags if injected, or runtime)
            // Note: In Vite, env vars are baked into the JS bundle. We can't see them easily here without importing the bundle.

            log('Checking Runtime Environment...', 'info');
            log(`User Agent: ${navigator.userAgent}`, 'info');
            log(`URL: ${window.location.href}`, 'info');

            // Check for global Supabase if exposed (unlikely in module system but checking)
            if (window.supabase) {
                log('Global Supabase instance found.', 'success');
            } else {
                log('Global Supabase instance NOT found (Expected for Module Federation).', 'warning');
            }

            log('To debug the "supabaseUrl is required" error:', 'highlight');
            log('1. Open Developer Tools (F12) -> Console', 'info');
            log('2. Look for "Uncaught Error: supabaseUrl is required"', 'error');
            log('3. If seen, it CONFIRMS that VITE_SUPABASE_URL was undefined during the build process.', 'error');

            log('DIAGNOSIS:', 'warning');
            log('The application was built without the .env variables present.', 'warning');
            log('Please ensure your deployment pipeline (Vercel, Netlify, etc.) has VITE_SUPABASE_URL and VITE_SUPABASE_ANON_KEY defined in the dashboard.', 'warning');

        } catch (e) {
            log(`Critical Error: ${e.message}`, 'error');
        }
    </script>
</body>

</html>
