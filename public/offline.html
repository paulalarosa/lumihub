<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Khaos Kontrol</title>
    <style>
        body {
            margin: 0;
            background: #0a0a0a;
            color: #fff;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }

        h1 {
            color: #00ff00;
            margin-bottom: 16px;
        }

        p {
            color: #999;
            margin-bottom: 24px;
        }

        button {
            background: #00ff00;
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div>
        <h1>📡 Sem Conexão</h1>
        <p>Você está offline. Algumas funcionalidades podem estar limitadas.</p>
        <button onclick="location.reload()">Tentar Novamente</button>
    </div>
</body>

</html>
