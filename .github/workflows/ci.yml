name: Khaos Kontrol CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    name: Lint + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Type check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}
          VITE_GA_MEASUREMENT_ID: ${{ secrets.VITE_GA_MEASUREMENT_ID }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY }}
          VITE_GOOGLE_API_KEY: ${{ secrets.VITE_GOOGLE_API_KEY }}
          VITE_APP_VERSION: ${{ github.sha }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          # Pular prerender em CI: precisa de Chrome via puppeteer + memória.
          # Build do deploy é mesmo dist/ — prerender é otimização SEO opcional.
          SKIP_PRERENDER: "1"
          NODE_OPTIONS: --max_old_space_size=4096

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm run test -- --run --reporter=verbose
        env:
          VITE_SUPABASE_URL: https://mock.supabase.co
          VITE_SUPABASE_ANON_KEY: mock-key

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Build for E2E
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://mock.supabase.co
          VITE_SUPABASE_ANON_KEY: mock-key

      - name: Run Playwright tests
        run: npx playwright test
        env:
          VITE_SUPABASE_URL: https://mock.supabase.co
          VITE_SUPABASE_ANON_KEY: mock-key

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    needs: lint-and-build
    # Roda só em PR pra evitar custo em main (push). Reutiliza o dist
    # do job lint-and-build pra não rebuildar.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./.lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
        # continue-on-error pra não bloquear merge enquanto Performance
        # baseline está em 62. Quando estiver verde, remover o flag e
        # virar gate real.
        continue-on-error: true

  deploy:
    name: Deploy to S3 + CloudFront
    runs-on: ubuntu-latest
    needs: [lint-and-build, unit-tests]
    # Só faz deploy em push pro main (não roda em PRs).
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Sync to S3
        # --delete remove arquivos do bucket que não estão mais no dist.
        # Cache headers diferentes por tipo: HTML curto (revalidar rápido),
        # assets com hash (cache longo).
        run: |
          # Assets com hash no nome (vendor-*.js, *-CV9WJ5UQ.css) → cache 1 ano
          aws s3 sync dist/ s3://khaoskontrol-prod/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html" --exclude "service-worker.js" --exclude "sw.js" \
            --exclude "manifest.json" --exclude "robots.txt" --exclude "sitemap.xml"

          # HTML + service worker + manifest → cache curto (revalidar)
          aws s3 sync dist/ s3://khaoskontrol-prod/ \
            --cache-control "public, max-age=0, must-revalidate" \
            --exclude "*" \
            --include "*.html" --include "service-worker.js" --include "sw.js" \
            --include "manifest.json" --include "robots.txt" --include "sitemap.xml"

      - name: Invalidate CloudFront
        # Invalida tudo após deploy. CloudFront cobra $0.005/path acima de 1000/mês.
        # `/*` conta como 1 path. Free tier de 1000 = ~30 deploys/dia.
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E1QWOTTUQ1VK6N \
            --paths "/*"
